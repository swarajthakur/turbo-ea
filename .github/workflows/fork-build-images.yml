name: Build & push images to fork GHCR

# Lean, fork-friendly image build. Publishes every app image to the fork
# owner's GHCR namespace (ghcr.io/<owner>/turbo-ea/<service>) so a self-hosted
# stack can point docker-compose at its own images. Unlike docker-publish.yml
# this skips multi-arch, cosign signing and the Trivy CRITICAL gate, so a fork
# build never blocks on upstream CVEs.
#
# Runs automatically on push to main or any fix/** branch, and on manual
# dispatch. Images are tagged :latest and :sha-<short>.

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "fix/**"
    paths:
      - "backend/**"
      - "frontend/**"
      - "mcp-server/**"
      - "Dockerfile"
      - ".github/workflows/fork-build-images.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: fork-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Same targets as docker-publish.yml (ollama excluded — it's just a
        # thin non-root patch on ollama/ollama:latest, not worth rebuilding).
        image: [db, backend, frontend, nginx, mcp-server]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name + tags
        id: img
        run: |
          # GHCR requires a lowercase path; ${VAR,,} lowercases the owner/repo.
          repo="${GITHUB_REPOSITORY,,}"                    # e.g. swarajthakur/turbo-ea
          image="ghcr.io/${repo}/${{ matrix.image }}"
          echo "tags=${image}:latest,${image}:sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.image }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.img.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
